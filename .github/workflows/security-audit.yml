name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security audit weekly on Monday at 9:00 UTC
    - cron: '0 9 * * 1'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked
      
    - name: Install cargo-deny
      run: cargo install cargo-deny --locked
      
    - name: Run security audit
      run: cargo audit --json | tee audit-report.json
      
    - name: Check for duplicate dependencies
      run: cargo tree --duplicates
      
    - name: Run cargo-deny
      run: cargo deny check
      
    - name: Run clippy
      run: cargo clippy --all-features -- -D warnings
      
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Upload audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-audit-report
        path: audit-report.json
        
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const vulnerabilities = report.vulnerabilities || [];
            
            let comment = '## 🔒 Security Audit Results\n\n';
            
            if (vulnerabilities.length === 0) {
              comment += '✅ No vulnerabilities found!\n\n';
            } else {
              comment += `⚠️ Found ${vulnerabilities.length} vulnerabilities:\n\n`;
              
              vulnerabilities.forEach((vuln, index) => {
                comment += `### ${index + 1}. ${vuln.advisory.title}\n`;
                comment += `- **Package**: ${vuln.advisory.package}\n`;
                comment += `- **Severity**: ${vuln.advisory.severity}\n`;
                comment += `- **URL**: ${vuln.advisory.url}\n\n`;
              });
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not parse audit report:', error.message);
          }
